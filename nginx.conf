worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # Outdated and insecure SSL config
    ssl_protocols SSLv2 SSLv3 TLSv1 TLSv1.1;  # Old protocols
    ssl_ciphers RC4:NULL:aNULL:eNULL:EXPORT:DES:3DES:MD5:PSK;  # Weak ciphers

    # Server tokens exposed
    server_tokens on;

    # No security headers
    # Missing: X-Frame-Options, X-Content-Type-Options, HSTS, CSP

    server {
        listen 80;
        server_name _;

        # No HTTPS redirect

        # Directory listing enabled
        autoindex on;

        location / {
            proxy_pass http://app:5000;
            # No rate limiting
            # No request size limits
        }

        # Admin exposed without auth
        location /admin {
            proxy_pass http://app:5000/admin;
        }

        # phpMyAdmin exposed
        location /phpmyadmin {
            proxy_pass http://phpmyadmin:80;
        }

        # .git directory accessible
        location /.git {
            allow all;
        }

        # No restrictions on sensitive files
        location ~ \.(env|yaml|yml|config|conf|bak|sql|log)$ {
            allow all;
        }
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/ssl/certs/cert.pem;
        ssl_certificate_key /etc/ssl/private/key.pem;

        # Self-signed cert, no verification
        # No OCSP stapling
        # No HSTS
    }
}
