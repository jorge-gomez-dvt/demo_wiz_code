apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-app
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vulnerable-app
  template:
    metadata:
      labels:
        app: vulnerable-app
    spec:
      # Running as root
      securityContext:
        runAsUser: 0
        runAsGroup: 0

      containers:
      - name: app
        image: myapp:latest
        imagePullPolicy: Always
        securityContext:
          privileged: true           # Privileged container
          allowPrivilegeEscalation: true
          readOnlyRootFilesystem: false
          capabilities:
            add:
              - NET_ADMIN
              - SYS_ADMIN
              - ALL                  # All capabilities
        env:
        # Hardcoded secrets in env vars
        - name: DB_PASSWORD
          value: "SuperSecret123!"
        - name: JWT_SECRET
          value: "hardcoded_jwt_secret"
        - name: AWS_ACCESS_KEY_ID
          value: "AKIAIOSFODNN7EXAMPLE"
        - name: AWS_SECRET_ACCESS_KEY
          value: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
        - name: STRIPE_KEY
          value: "sk_live_DEMO_FAKE_KEY_FOR_WIZ_SCAN"
        ports:
        - containerPort: 5000
        # No resource limits
        volumeMounts:
        - name: host-root
          mountPath: /host
        - name: docker-sock
          mountPath: /var/run/docker.sock

      volumes:
      - name: host-root
        hostPath:
          path: /          # Mounting host root
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock

---
apiVersion: v1
kind: Service
metadata:
  name: vulnerable-app-svc
spec:
  type: LoadBalancer          # Directly exposed
  selector:
    app: vulnerable-app
  ports:
  - port: 80
    targetPort: 5000

---
# Service account with admin privileges
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-service-account
  namespace: production

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: app-admin-binding
subjects:
- kind: ServiceAccount
  name: app-service-account
  namespace: production
roleRef:
  kind: ClusterRole
  name: cluster-admin       # Full cluster admin!
  apiGroup: rbac.authorization.k8s.io
